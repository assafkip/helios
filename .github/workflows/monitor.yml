name: Signal Monitor

on:
  schedule:
    # Run every hour, on the hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run VC signal monitor for every vertical
        run: |
          verticals=$(python -c "import json; print(' '.join(v['id'] for v in json.load(open('verticals.json'))['verticals']))")
          echo "verticals: $verticals"
          for v in $verticals; do
            echo "==== $v ===="
            python scripts/live_monitor.py --vertical "$v" --verbose || echo "vertical $v failed, continuing"
          done

      - name: Compute trend analytics
        run: python scripts/compute_trends.py

      - name: Derive revealed fund intent (deals-per-fund)
        # Regex-first; the Haiku body-extract fallback fires only if the
        # ANTHROPIC_API_KEY secret is set. Without it, this degrades to
        # regex-only and still writes an honest (lower-coverage) fund-intent.json.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/derive_fund_intent.py

      - name: Mine SEC Form D dry-powder signals
        # Free gov data; degrades to leaving form-d-signals.json unchanged if
        # EDGAR is unreachable. No key needed.
        run: python scripts/fetch_form_d.py || echo "form D fetch failed, continuing"

      - name: Build per-sector alert feeds
        run: python scripts/build_alert_feeds.py

      - name: Check for changes
        id: check_changes
        run: |
          git add -A signals-*.json trends.json trends-history.json fund-intent.json investor-cache.json form-d-signals.json alerts/ data/
          git diff --cached --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name 'Signal Monitor Bot'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "Update signals $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Push with rebase-retry: master often advances mid-run (PR merges,
          # a concurrent run). A plain push then loses the whole commit. On a
          # rejected push, integrate remote and keep OUR freshly-generated data
          # on conflict (it ran on the latest inputs), then retry.
          for attempt in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push rejected (attempt $attempt) — integrating remote, keeping fresh data"
            git fetch origin master
            git merge -X ours --no-edit origin/master || { echo "merge failed"; exit 1; }
          done
          echo "push failed after 5 attempts" >&2
          exit 1
