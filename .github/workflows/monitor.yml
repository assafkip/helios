name: Signal Monitor

on:
  schedule:
    # Run every hour, on the hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run VC signal monitor for every vertical
        run: |
          verticals=$(python -c "import json; print(' '.join(v['id'] for v in json.load(open('verticals.json'))['verticals']))")
          echo "verticals: $verticals"
          for v in $verticals; do
            echo "==== $v ===="
            python scripts/live_monitor.py --vertical "$v" --verbose || echo "vertical $v failed, continuing"
          done

      - name: Check for changes
        id: check_changes
        run: |
          git add -A signals-*.json data/
          git diff --cached --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name 'Signal Monitor Bot'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "Update signals $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
